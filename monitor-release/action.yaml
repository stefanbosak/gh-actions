name: 'Monitor Release'
description: >
  Monitors one or more GitHub repositories for new releases.
  Accepts a JSON array or object of (owner, repo) pairs.
  Prefers a pre-release when it is newer than the latest stable release.

inputs:
  projects:
    description: |
      JSON array of {owner, repo, usetag?} objects, or a JSON object mapping owner → repo.
      Array:  [{"owner":"acme","repo":"widget"},{"owner":"acme","repo":"gadget","usetag":true}]
      Object: {"acme":"widget"}
      usetag (default false): when true, resolves the latest version via git tags instead of
      releases/pre-releases — useful when a project does not keep its GitHub Releases up-to-date.
    required: true

runs:
  using: composite
  steps:
    # Restore with a prefix — always gets the most recently saved entry
    - name: Restore cached last-known tags
      uses: actions/cache/restore@main
      with:
        path: .last-known-tags.json
        key: last-known-${{ github.run_id }}   # never matches (forces restore-keys lookup)
        restore-keys: last-known-              # matches any previously saved entry

    - name: Fetch latest releases and dispatch on change
      id: monitor
      uses: actions/github-script@main
      env:
        PROJECTS: ${{ inputs.projects }}
      with:
        script: |
          const fs = require('fs');

          // Parse input — accept JSON array [{owner,repo},...] or object {owner:repo,...}
          let raw;
          try {
            raw = JSON.parse(process.env.PROJECTS);
          } catch (e) {
            core.setFailed(`"projects" is not valid JSON: ${e.message}`);
            return;
          }

          let pairs;
          if (Array.isArray(raw)) {
            pairs = raw;
          } else if (raw && typeof raw === 'object') {
            pairs = Object.entries(raw).map(([owner, repo]) => ({ owner, repo }));
          } else {
            core.setFailed('"projects" must be a JSON array or object');
            return;
          }

          // Load cached per-repo tags
          const cacheFile = '.last-known-tags.json';
          let cached = {};
          if (fs.existsSync(cacheFile)) {
            try { cached = JSON.parse(fs.readFileSync(cacheFile, 'utf8')); } catch (_) {}
          }

          const updated = { ...cached };
          const changes = [];   // all successfully fetched projects (full snapshot for payload)
          let hasNewRelease = false;

          for (const { owner, repo, usetag } of pairs) {
            const key = `${owner}/${repo}`;
            let tag = '', type = '', meta = {};

            if (usetag) {
              let tags;
              try {
                ({ data: tags } = await github.rest.repos.listTags({ owner, repo, per_page: 10 }));
              } catch (e) {
                console.log(`[${key}] Failed to fetch tags: ${e.message}`);
                continue;
              }
              if (!tags.length) { console.log(`[${key}] No tags found.`); continue; }
              const latest = tags[0];
              tag  = latest.name;
              type = 'tag';
              meta = { commit: latest.commit.sha };
            } else {
              let releases;
              try {
                ({ data: releases } = await github.rest.repos.listReleases({ owner, repo, per_page: 10 }));
              } catch (e) {
                console.log(`[${key}] Failed to fetch releases: ${e.message}`);
                continue;
              }

              const prerelease = releases.find(r => r.prerelease);
              const release    = releases.find(r => !r.prerelease);
              let selected;

              if (prerelease && release) {
                const newer = new Date(prerelease.published_at) > new Date(release.published_at);
                selected = newer ? prerelease : release;
                type     = newer ? 'prerelease' : 'release';
              } else if (prerelease) {
                selected = prerelease; type = 'prerelease';
              } else if (release) {
                selected = release;    type = 'release';
              }

              if (selected) {
                tag  = selected.tag_name;
                meta = { published_at: selected.published_at, html_url: selected.html_url };
              }
            }

            if (!tag) { console.log(`[${key}] No release found.`); continue; }
            console.log(`[${key}] Selected ${type}: ${tag}`);

            const cachedTag = cached[key] ?? '';
            if (tag !== cachedTag) {
              console.log(`[${key}] New release detected: ${tag} (was: ${cachedTag || 'none'})`);
              hasNewRelease = true;
            } else {
              console.log(`[${key}] No change (${tag}).`);
            }

            changes.push({ owner, repo, tag, type, ...meta });
            updated[key] = tag;
          }

          fs.writeFileSync(cacheFile, JSON.stringify(updated, null, 2));

          if (hasNewRelease) {
            console.log(`Dispatching new-release event (${changes.length} project(s) in payload).`);
            await github.rest.repos.createDispatchEvent({
              owner: context.repo.owner,
              repo:  context.repo.repo,
              event_type: 'new-release',
              client_payload: { changes },
            });
          }

    # Save with a unique key each run — avoids the "already exists" conflict
    - name: Update cache
      uses: actions/cache/save@main
      with:
        path: .last-known-tags.json
        key: last-known-${{ github.run_id }}

    - name: Delete old caches
      uses: actions/github-script@main
      with:
        script: |
          const keyPrefix = 'last-known-';
          const { data } = await github.rest.actions.getActionsCacheList({
            owner: context.repo.owner,
            repo:  context.repo.repo,
            key:   keyPrefix,
            per_page: 100,
          });
          const caches = data.actions_caches.sort(
            (a, b) => new Date(b.created_at) - new Date(a.created_at)
          );
          for (const cache of caches.slice(1)) {
            console.log(`Deleting old cache: ${cache.key} (id ${cache.id})`);
            await github.rest.actions.deleteActionsCacheById({
              owner: context.repo.owner,
              repo:  context.repo.repo,
              cache_id: cache.id,
            });
          }
